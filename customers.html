<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <title>Customers Detail</title>
    <style>
      body {
        background-color: #024558;
        font-family: "Poppins", "Courier New", Courier, monospace, sans-serif;
        margin: 0;
        padding: 0;
      }

      /* ------------------- Sidebar Styling ------------------- */
      .sidebar {
        height: 100vh;
        width: 250px;
        padding: 25px;
        background-color: #024558;
        color: #f8d0a4;
        position: fixed;
        top: 0;
        left: 0;
        box-shadow: 4px 0px 12px rgba(0, 0, 0, 0.5);
        overflow-y: auto;
      }

      .sidebar h2 {
        color: #f8d0a4;
        font-weight: bold;
        margin-bottom: 25px;
        font-size: 28px;
      }

      .sidebar a {
        font-size: 20px;
        color: #ffffff;
        text-decoration: none;
        display: block;
        padding: 12px 0;
        border-radius: 8px;
        margin: 5px 10px;
        transition: 0.3s ease-in-out;
      }

      .sidebar a:hover {
        background-color: #f8d0a4;
        color: #024558;
        transform: scale(1.05);
      }

      /* ------------------- Navbar ------------------- */

      .navbar {
        background-color: #024558 !important;
        box-shadow: 4px 0px 12px rgba(0, 0, 0, 2);
      }

      .navbar .navbar-brand {
        color: #f8d0a4 !important;
        font-weight: bold;
        font-size: 25px;
      }

      .navbar .navbar-toggler {
        border-color: rgba(255, 255, 255, 0.4);
      }

      .navbar .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 0.85)' stroke-linecape='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22' /%3e%3c/svg%3e");
      }

      .navbar-expand-lg .navbar-nav .nav-link {
        padding: 10px;
      }

      a.nav-link {
        color: #f8d0a4 !important;
        padding: 10px;
        font-size: 20px;
        font-weight: 400;
      }

      li.nav-item:hover {
        color: white !important;
        transform: scale(1.05);
        cursor: pointer;
      }

      /* ------------------- Main Content ------------------- */
      .main-content {
        margin-left: 251px;
        padding: 2px;
        min-height: 100vh;
        background-color: #024558;
      }

      .card-header {
        background-color: #024558;
        color: #f8d0a4;
      }

      h2.mb-0 {
        font-size: 30px;
        font-weight: 700;
      }

      .card-body {
        background-color: #024558;
      }

      table {
        width: 100%;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }

      .table thead {
        background-color: #024558;
        color: #fff;
        font-size: 20px;
      }

      .table-hover tbody tr:hover {
        background-color: #e0f2f1;
      }

      /* admin image */
      img.rounded-circle {
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      } 

      /* Buttons */
      .btn-info,
      .btn-primary {
        background-color: #024558 !important;
        border: none !important;
        color: #f8d0a4 !important;
      }

      .btn-danger {
        background-color: #b30000 !important;
        border: none;
      }

      .btn:hover {
        transform: scale(1.05);
        transition: 0.2s;
      }
      .highlight {
        background-color: #f8d0a4 !important;
        color: #024558 !important;
      }

      .badges {
        font-size: 0.9em;
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <h2 class="text-center">Admin Panel</h2>
      <a href="index.html">Dashboard</a>
      <a href="orders.html">Orders</a>
      <a href="customers.html">Customers</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- NAVBAR & LINKS -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-1">
        <div class="container-fluid">
          <div class="ms-auto d-flex align-items-center">
            <!-- Admin Profile -->
            <div class="dropdown">
              <a
                class="nav-link dropdown-toggle text-light"
                href="#"
                id="adminProfile"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <img
                  src="https://via.placeholder.com/30"
                  alt="Admin"
                  class="rounded-circle"
                  width="30"
                  height="30"
                />
                <span class="ms-2">Volgue Mart</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="adminProfile">
                <li><a class="dropdown-item" href="index.html#adminProfile">My Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Logout</a></li>
              </ul>
            </div>
          </div>
          <!-- Toggler button --> 
          <button
            class="navbar-toggler ms-3"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Dashboard</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="orders.html">Orders</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="customers.html">Customers</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!--  View customers -->
      <div class="container flex-grow-1 mt-4">
        <div class="card shadow">
          <div class="card-header">
            <h2 class="mb-0">Customers</h2>
          </div>
          <div class="card-body">
            <table
              class="table table-bordered table-hover border-primary"
              id="customersTable"
            >
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Orders</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-analytics.js";
  import { getFirestore, collection, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNxRHl4y1AFmS7kY30dwylHQUOxO5wE5s",
    authDomain: "e-commerce-d3e51.firebaseapp.com",
    projectId: "e-commerce-d3e51",
    storageBucket: "e-commerce-d3e51.firebasestorage.app",
    messagingSenderId: "743533909938",
    appId: "1:743533909938:web:096a83304553ed5d13f6ab",
    measurementId: "G-578751H5MD",
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  // Logout button
  document.getElementById("logoutBtn").addEventListener("click", e => {
    e.preventDefault();
    alert("You have been Logged out successfully!");
    window.location.href = "index.html";
  });

  // Fetch customers
  async function loadCustomers() {
    const snapshot = await getDocs(collection(db, "customers"));
    const customers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderCustomers(customers);
  }

  function renderCustomers(customers) {
    const tbody = document.querySelector("#customersTable tbody");
    tbody.innerHTML = "";

    customers.forEach(c => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone}</td>
        <td>
          <a href="orders.html?id=${c.id}" class="btn btn-sm btn-info">View</a>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  loadCustomers();
</script>
</html>
