<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <title>E-Commerce</title>
</head>

<body>
  <div class="d-flex">

<!-- Sidebar -->
    <div class="sidebar">
      <h2 class="text-center">Admin Panel</h2>
      <a href="index.html">Dashboard</a>
      <a href="orders.html">Orders</a>
      <a href="customers.html">Customers</a>
    </div>

<!-- Main Content -->
  <div class="content flex-grow-1 p-2">
    <nav class="navbar navbar-dark bg-dark mb-4">
      <span class="navbar-brand mb-0 h1">
        Welcome, Admin!
      </span>
    </nav>

<div class="container mt-4 profile-section" id="adminProfile">
  <div class="card shadow-sm">
    <div class="card-body text-center ">
      <img src="https://via.placeholder.com/100x100" class="rounded-circle mb-3" width="100" height="100" alt="Admin">
      <h4 class="card-title">Admin Name</h4>
      <p class="card-text text-muted"><span id="profileEmail">Not signed In</span></p>
      <p class="card-text">Role: Super Admin</p>
      <p class="card-text">Joined: Oct 2025</p>
      
      <hr>
      <div class="row">
        <div class="col">
          <h5>120</h5>
          <p class="text-muted">Orders Managed</p>
        </div>
        <div class="col">
          <h5>45</h5>
          <p class="text-muted">Customers Added</p>
        </div>
      </div>
    </div>
  </div>
</div>
    
  <!-- Cards -->
  <div class="row text-center">
    <div class="col-md-6 mb-4">
      <a href="orders.html" style="text-decoration: none;">
        <div class="card shadow card-hover">
          <div class="card-body">
            <h3>Orders</h3>
            <p> View and Manage all orders</p>
          </div>
        </div>
      </a>
      </div>

    <div class="col-md-6 md-4">
      <a href="customers.html" style="text-decoration: none;">
        <div class="card shadow card-hover">
          <div class="card-body">
            <h3>Customers</h3>
            <p> View and Manage all Customers details</p>
          </div>
        </div>
      </a>
    </div>
    </div>
</body>
<script src="main.js"></script>
<script>
      // Navigation and highlight
    document.getElementById('adminProfileLink').addEventListener('click', function(e) {
      e.preventDefault();

      //get profile section
      document.getElementById('adminProfile').scrollIntoView({ behavior: 'smooth' });

      // add highlight
      let profile = document.getElementById('adminProfile');
      profile.classList.add('highlight');

      // Remove highlight after 3 seconds
      setTimeout(() => {
        profile.classList.remove('highlight');
      }, 3000);
    });

</script>
</html>
