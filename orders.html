      <!-- View Orders -->
      <div class="container flex-grow-1 mt-4">

  <script type="module">
    /* Import the functions you need from the SDKs you need */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-analytics.js";
    import { getFirestore, collection, query, where, getDocs, doc, updateDoc, deleteDoc } 
    from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNxRHl4y1AFmS7kY30dwylHQUOxO5wE5s",
      authDomain: "e-commerce-d3e51.firebaseapp.com",
      projectId: "e-commerce-d3e51",
      storageBucket: "e-commerce-d3e51.firebasestorage.app",
      messagingSenderId: "743533909938",
      appId: "1:743533909938:web:096a83304553ed5d13f6ab",
      measurementId: "G-578751H5MD",
    };

    /* Initialize Firebase */
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);

    /* Initialize firestore */
    const db = getFirestore(app);

    /*Logout button */
    document.getElementById("logoutBtn").addEventListener('click', function (e) {
        e.preventDefault();
        alert("You have been Logged out successfully!");
        window.location.href = "index.html";
      });

    /*get customer id from URL */
    const params = new URLSearchParams(window.location.search);
    const customerId = parseInt(params.get("id"));

    let orders = [];

    /* Load Orders using firestore */
    async function loadOrders() {
      let q = collection(db, "orders");

      if (customerId) {
        q = query(q, where("customerId", "==", customerId));
      }

      const snapshot = await getDocs(q);
      orders = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
      renderOrders(orders);
    }

    /* Render orders into table */
function renderOrders(list) {
  const tableBody = document.getElementById("orderTableBody");
  tableBody.innerHTML = "";

  list.forEach(order => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${order.id}</td>
      <td>${order.customer || "Unknown"}</td>
      <td>${order.product}</td>
      <td>${order.date}</td>
      <td>${order.status}</td>
      <td>₹${order.total}</td>
      <td>
        <select>
          <option ${order.status === "Pending" ? "selected" : ""}>Pending</option>
          <option ${order.status === "Shipped" ? "selected" : ""}>Shipped</option>
          <option ${order.status === "Delivered" ? "selected" : ""}>Delivered</option>
          <option ${order.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
        </select>
        <button class="btn btn-sm btn-danger">Delete</button>
        <button class="btn btn-outline-primary btn-sm">View</button>
      </td>
    `;

    // Bind events
    row.querySelector("select").addEventListener("change", e => {
      updateStatus(order.id, e.target.value);
    });

    row.querySelector(".btn-danger").addEventListener("click", () => {
      deleteOrders(order.id);
    });

    row.querySelector(".btn-outline-primary").addEventListener("click", () => {
      viewCustomer(order.customerId);
    });

    tableBody.appendChild(row);
  });
}

    /*Search input */
    function filterOrders() {
      const query = document.getElementById("searchBox").value.toLowerCase();
      const filtered = orders.filter(o =>
          o.id.toString().includes(query) ||
          (o.customer?.toLowerCase().includes(query)) ||
          (o.date?.toLowerCase().includes(query)) ||
          (o.status?.toLowerCase().includes(query))
      );
      renderOrders(filtered);
    }

    /* Update order status - DELIVERED | CANCELLED | PENDING | SHIPPED */
    async function updateStatus(id, newStatus) {
      const orderRef = doc(db, "orders", id);
      await updateDoc(orderRef, { status: newStatus });
      loadOrders();
      //Reload after update
    }

    /*Delete button */
    async function deleteOrders(id) {
      const orderRef = doc(db, "orders", id);
      await deleteDoc(orderRef);
      loadOrders();
    }

    /* Redirect to customer page */
    function viewCustomer(customerId) {
      window.location.href = `customers.html?id=${customerId}`;
    }

    loadOrders();
  </script>
